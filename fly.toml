# Fly.io configuration for Peak Overwatch
# Migrating from Render to fix 45-90s cold starts

app = "peak-overwatch"
primary_region = "iad"  # Washington DC (closest to Orlando)

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  FLASK_ENV = "production"
  PYTHON_VERSION = "3.14"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Keep alive to prevent cold starts
  auto_start_machines = true
  min_machines_running = 1     # Always keep 1 instance running
  processes = ["app"]

  [[http_service.ports]]
    port = 80
    handlers = ["http"]
  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]

[mounts]
  source = "data"
  destination = "/data"

[processes]
  app = "cd dashboard && python app.py"

[deploy]
  strategy = "rolling"
  max_unavailable = 0